name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Type check (web)
        run: npm --workspace apps/web run type-check

      - name: Lint (web)
        run: npm --workspace apps/web run lint

      - name: Prettier check (web)
        run: npm --workspace apps/web run format:check

      - name: Test (web)
        run: npm --workspace apps/web run test

  server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Test (server)
        run: npm --workspace apps/server run test
