<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 110" preserveAspectRatio="none">
  <defs>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ffffff"/>
    </marker>
  </defs>
  <!-- Curved path from left to right with arrowhead -->
  <path d="M5,90 C120,10 140,10 255,90" fill="none" stroke="url(#arrowGrad)" stroke-width="3" marker-end="url(#arrowHead)"/>
</svg>
